# Projects displayed at /projects. Categories are rendered in `order`,
# items within a category in `order` (lower = earlier). Optional fields:
#   image: path under public/, e.g. /img/projects/nuxt-fyi.png
#   icon:  unocss icon class (used when image is absent), e.g. i-ri:rocket-line
#   repo:  GitHub URL; renders as an overlay link in the top-right
#   url:   live site link (the card itself links here, or repo if absent)
#   archived: true to dim the card and mark as archived


